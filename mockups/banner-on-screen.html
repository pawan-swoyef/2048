<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2048 — Current Screen + Banner Ad</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; }
  body { background:#111; padding:20px 16px 50px; display:flex; justify-content:center; }
  .wrap { width:370px; max-width:100%; }
  .caption { color:#bbb; text-align:center; font-size:13px; margin-bottom:14px; }

  .screen {
    border-radius:30px; overflow:hidden; height:780px;
    background:linear-gradient(180deg,#5d3df5 0%,#9a3ff2 55%,#f53d9e 100%);
    display:flex; flex-direction:column; color:#fff; position:relative;
  }

  /* status bar */
  .status { display:flex; justify-content:space-between; align-items:center; padding:10px 18px 0; font-size:13px; font-weight:600; }
  .status .right { display:flex; gap:6px; align-items:center; }
  .battery { background:#000; color:#fff; border-radius:8px; padding:1px 6px; font-size:11px; }

  .content { flex:1; padding:14px 20px 0; }

  .head { display:flex; justify-content:space-between; align-items:center; margin:10px 0 18px; }
  .logo { font-size:42px; font-weight:800; text-shadow:0 3px 12px rgba(0,0,0,.45); }
  .scores { display:flex; gap:10px; }
  .sbox { background:rgba(255,255,255,.16); border:1.2px solid rgba(255,255,255,.32); border-radius:14px; padding:9px 16px; text-align:center; min-width:78px; }
  .slabel { font-size:11px; letter-spacing:1px; font-weight:700; color:#ffffffcc; }
  .sval { font-size:22px; font-weight:800; margin-top:2px; }

  .subrow { display:flex; align-items:center; gap:9px; margin-bottom:14px; }
  .tag { flex:1; font-size:14px; line-height:1.3; }
  .ic { width:46px; height:46px; border-radius:10px; background:rgba(255,255,255,.20); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .new { background:#fff; color:#6a2dbf; border:none; border-radius:10px; padding:13px 16px; font-weight:700; font-size:15px; }

  .board { background:rgba(255,255,255,.13); border:1.4px solid rgba(255,255,255,.30); border-radius:18px; padding:10px; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr); gap:10px; aspect-ratio:1/1; }
  .cell { background:rgba(255,255,255,.10); border-radius:14px; }
  .t { border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:30px; box-shadow:0 4px 8px rgba(0,0,0,.20); }
  .t2{background:#e7e7f7;color:#1e2a4a;} .t4{background:#7fe0d2;color:#1e2a4a;}
  .hint { text-align:center; margin-top:16px; font-size:14px; color:#ffffffb8; }

  /* ===== BANNER AD — pinned bottom ===== */
  .ad {
    margin-top:auto; height:62px; background:#fff; display:flex; align-items:center; gap:10px;
    padding:0 12px; position:relative;
  }
  .ad .badge { position:absolute; top:5px; left:7px; background:#f4c20d; color:#222; font-size:8px; font-weight:800; padding:1px 5px; border-radius:3px; letter-spacing:.5px; }
  .ad .icon { width:42px; height:42px; border-radius:9px; background:linear-gradient(135deg,#3ddc97,#1aa179); flex-shrink:0; }
  .ad .body { flex:1; min-width:0; padding-left:2px; }
  .ad .title { font-size:13px; font-weight:700; color:#202124; }
  .ad .desc { font-size:11px; color:#5f6368; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ad .cta { background:#1a73e8; color:#fff; border:none; border-radius:6px; padding:9px 16px; font-size:12px; font-weight:700; flex-shrink:0; }

  .gesture { height:24px; background:#fff; display:flex; align-items:flex-start; justify-content:center; }
  .gesture .bar { width:120px; height:4px; border-radius:3px; background:#cfcfcf; margin-top:4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="caption">MOCKUP — your current screen with the banner ad filling the empty space at the bottom</div>
    <div class="screen">

      <div class="status">
        <div>11:27</div>
        <div class="right">🔇 📶 ▮▮▮ <span class="battery">87</span></div>
      </div>

      <div class="content">
        <div class="head">
          <div class="logo">2048</div>
          <div class="scores">
            <div class="sbox"><div class="slabel">SCORE</div><div class="sval">4</div></div>
            <div class="sbox"><div class="slabel">BEST</div><div class="sval">28400</div></div>
          </div>
        </div>

        <div class="subrow">
          <div class="tag">Join the tiles, get to <b>2048!</b></div>
          <div class="ic">🔇</div>
          <div class="ic">?</div>
          <button class="new">New Game</button>
        </div>

        <div class="board">
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
          <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="t t2">2</div>
          <div class="t t4">4</div><div class="cell"></div><div class="t t4">4</div><div class="cell"></div>
        </div>

        <div class="hint">Swipe ← ↑ → ↓ to move</div>
      </div>

      <!-- Banner ad fills the empty bottom area -->
      <div class="ad">
        <span class="badge">AD</span>
        <div class="icon"></div>
        <div class="body">
          <div class="title">Cool Puzzle Game</div>
          <div class="desc">Free • 4.6 ★ • Play now and relax</div>
        </div>
        <button class="cta">Install</button>
      </div>
      <div class="gesture"><div class="bar"></div></div>

    </div>
  </div>
</body>
</html>
